<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <title>Document</title>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,300;0,400;0,500;1,100;1,200&display=swap"
            rel="stylesheet">
    </head>

    <body>
        <div class="container">
            <div class="upper-section">
                <input type="text" autofocus>
                <p id="result">0</p>
            </div>
            <div class="lower-section">
                <div class="row1">
                    <button>C</button>
                    <button>()</button>
                    <button>%</button>
                    <button>&#xF7;</button>
                </div>
                <div class="row2">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button>X</button>
                </div>
                <div class="row3">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>-</button>
                </div>
                <div class="row4">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>+</button>
                </div>
                <div class="row5">
                    <button>+/-</button>
                    <button>0</button>
                    <button>.</button>
                    <button>=</button>
                </div>
            </div>
        </div>


        <button onclick="addOperator('add')">Add</button>
        <button onclick="addOperator('minus')">Minus</button>
        <button onclick="addOperator('multiply')">Multiply</button>
        <button onclick="addOperator('divide')">Divide</button>

        <button onclick="calc()">Result</button>
        <button onclick="clear()">Clear</button>


        <script>
            const params = document.getElementsByTagName("input")[0].value
            function addOperator(operator) {
                if (operator == "add") {
                    document.getElementsByTagName("input")[0].value += "+"
                } else if (operator == "minus") {
                    document.getElementsByTagName("input")[0].value += "-"
                } else if (operator == "multiply") {
                    document.getElementsByTagName("input")[0].value += "*"
                } else if (operator == "divide") {
                    document.getElementsByTagName("input")[0].value += "/"
                } else {
                    return null;
                }

            }

            let calc = () => {
                let result = eval(document.getElementsByTagName("input")[0].value)
                document.getElementById('result').innerHTML = result
                console.log(result, document.getElementsByTagName("input")[0].value);
            }

            let clear = () => {
                document.getElementsByTagName("input")[0].value = ""
                document.getElementById('result').innerHTML = ""
            }
        </script>
    </body>

</html>
