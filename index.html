<html>

    <head>
        <title>Myntra clone</title>
        <link rel="stylesheet" href="./css/index.css">
        <link rel="shortcut icon" href="./utils/myntra-logo.jpeg" type="image/x-icon">
    </head>

    <body>
        <!-- Header/Navbar -->
        <header>
            <div class="left">
                <img src="./utils/myntra-logo.png" alt="logo" id="logo" height="76%" width="17%"
                    style="padding-top: 10px">
                <div id="menu">
                    <a href="/shop/men">Men</a>
                    <a href="/shop/men">WOMEN</a>
                    <a href="/shop/men">KIDS</a>
                    <a href="/shop/men">HOME & LIVING</a>
                    <a href="/shop/men">BEAUTY</a>
                    <a href="/shop/men">STUDIO</a>
                </div>
            </div>
            <div class="right">
                <div id="search">
                    <input type="text" name="search" placeholder="Search for products, brands and more">
                </div>
                <div id="user-option">
                    <span>Profile</span>
                    <span>Wishlist</span>
                    <span>Bag</span>
                </div>
            </div>
        </header>

        <!-- Background Banner -->
        <section id="banner">
            <img src="./test/banner.jpg" alt="banner" height="100%" width="100%">
        </section>

        <!-- Background Banner Section - 2 -->
        <section id="banner-2">
            <img src="./test/banner2.gif" alt="banner" height="100%" width="100%">
        </section>

        <!-- OMG Deals -->
        <section id="omg-deals">
            <img src="./test/omg deals.png" alt="banner" height="211px" width="100%">
            <div>
                <img src="./test/omg data/1.png" alt="image-1" height="147px" width="135px" class="product">
                <img src="./test/omg data/2.png" alt="image-2" height="147px" width="135px" class="product">
                <img src="./test/omg data/4.png" alt="image-4" height="147px" width="135px" class="product">
                <img src="./test/omg data/5.png" alt="image-5" height="147px" width="135px" class="product">
                <img src="./test/omg data/6.png" alt="image-6" height="147px" width="135px" class="product">
                <img src="./test/omg data/7.png" alt="image-7" height="147px" width="135px" class="product">
                <img src="./test/omg data/8.png" alt="image-8" height="147px" width="135px" class="product">
                <img src="./test/omg data/9.png" alt="image-9" height="147px" width="135px" class="product">
                <img src="./test/omg data/10.png" alt="image-10" height="147px" width="135px" class="product">
            </div>
            
        </section>

        <!-- Budget Buys -->
        <section id="budget-buys">
            <img src="./test/budget buys/1.jpg" alt="banner" height="85px" width="100%">
            <div>
                <img src="./test/budget buys/2.jpg" alt="image-2" height="149px" width="113px">
                <img src="./test/budget buys/3.png" alt="image-3" height="149px" width="113px">
                <img src="./test/budget buys/3.png" alt="image-4" height="149px" width="113px">
                <img src="./test/budget buys/5.png" alt="image-5" height="149px" width="113px">
                <img src="./test/budget buys/6.png" alt="image-6" height="149px" width="113px">
                <img src="./test/budget buys/7.png" alt="image-7" height="149px" width="113px">
                <img src="./test/budget buys/8.png" alt="image-8" height="149px" width="113px">
                <img src="./test/budget buys/9.png" alt="image-9" height="149px" width="113px">
                <img src="./test/budget buys/10.png" alt="image-10" height="149px" width="113px">
                <img src="./test/budget buys/11.png" alt="image-11" height="149px" width="113px">
                <img src="./test/budget buys/12.png" alt="image-12" height="149px" width="113px">
            </div>
        </section>

        <!-- Top Categories -->
        <section id="top-categories">
            <center>Top Categories</center>
        </section>

        <!-- Top Brands At Best Price -->
        <section id="top-brands">
            <center>Top Brands</center>
        </section>

        <!-- Shop By Category -->
        <section id="shop-by-category">
            <center>Shop By Category</center>
        </section>

        <footer>
            <center>&copy; Copyright Myntra</center>
        </footer>
    </body>

</html>
